name: Build NetHunter Kernel a52sxq

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y \
            git bc bison flex libssl-dev libelf-dev \
            gcc make zip unzip cpio lz4 ccache \
            device-tree-compiler python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            --branch lineage-23.2 \
            https://github.com/LineageOS/android_kernel_samsung_sm7325 \
            kernel-src

      - name: Download NH builder and patches
        run: |
          curl -L \
            "https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel-builder/-/archive/main/kali-nethunter-kernel-builder-main.zip" \
            -o nh-builder.zip
          unzip nh-builder.zip
          mv kali-nethunter-kernel-builder-main nh-builder

      - name: Apply NetHunter patch
        run: |
          cd kernel-src
          patch -p1 --forward \
            < ../nh-builder/patches/5.4/add-qcacld-3.0-injection-5.4.patch \
            || echo "Patch applied with some skipped hunks - continuing"

      - name: Configure kernel
        run: |
          cd kernel-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make vendor/a52sxq_eur_opendefconfig
          scripts/config \
            --enable CONFIG_CFG80211 \
            --enable CONFIG_MAC80211 \
            --enable CONFIG_MAC80211_HWSIM \
            --enable CONFIG_USB_GADGET \
            --enable CONFIG_USB_RAW_GADGET \
            --enable CONFIG_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_USB_HID \
            --enable CONFIG_BT \
            --enable CONFIG_BT_HCIBTUSB \
            --enable CONFIG_TUN \
            --enable CONFIG_PPP \
            --enable CONFIG_VLAN_8021Q \
            --enable CONFIG_NF_CONNTRACK \
            --enable CONFIG_NETFILTER
          make olddefconfig

      - name: Build kernel
        run: |
          cd kernel-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) Image.gz dtbs 2>&1 | tee ../build.log
          echo "=== Build complete ==="
          ls arch/arm64/boot/

      - name: Package AnyKernel3
        run: |
          cp -r nh-builder/anykernel3 anykernel
          cp kernel-src/arch/arm64/boot/Image.gz anykernel/
          find kernel-src/arch/arm64/boot/dts/vendor \
            -name "*.dtb" -exec cat {} + > anykernel/dtb 2>/dev/null || \
          find kernel-src/arch/arm64/boot/dts \
            -name "*.dtb" -exec cat {} + > anykernel/dtb 2>/dev/null || true
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 \
            ../nethunter-kernel-a52sxq-lineage23.2.zip \
            . -x ".git*"
          echo "=== Zip created ==="
          ls -lh ../nethunter-kernel-a52sxq-lineage23.2.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a52sxq
          path: nethunter-kernel-a52sxq-lineage23.2.zip
          retention-days: 7
