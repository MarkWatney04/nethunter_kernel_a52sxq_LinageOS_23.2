name: Build NetHunter Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y \
            git bc bison flex libssl-dev libelf-dev \
            gcc make zip unzip cpio lz4 \
            device-tree-compiler python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clone kernel
        run: |
          git clone --depth=1 \
            --branch lineage-23.2 \
            https://github.com/LineageOS/android_kernel_samsung_sm7325 \
            kernel-src

      - name: Clone NetHunter patches
        run: |
          git clone --depth=1 \
            https://github.com/tomasz-grobelny/nethunter-kernel-patches.git \
            patches || \
          git clone --depth=1 \
            https://github.com/stdrc/kali-nethunter-kernel-patches.git \
            patches

      - name: Apply patches
        run: |
          cd kernel-src
          for patch in ../patches/5.4/*.patch; do
            echo "Applying $patch"
            git apply --ignore-whitespace "$patch" || echo "Skipped: $patch"
          done

      - name: Configure kernel
        run: |
          cd kernel-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make vendor/a52sxq_eur_opendefconfig
          scripts/config \
            --enable CONFIG_CFG80211 \
            --enable CONFIG_MAC80211 \
            --enable CONFIG_USB_GADGET \
            --enable CONFIG_USB_RAW_GADGET \
            --enable CONFIG_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_USB_HID \
            --enable CONFIG_BT \
            --enable CONFIG_BT_HCIBTUSB \
            --enable CONFIG_TUN \
            --enable CONFIG_PPP \
            --enable CONFIG_VLAN_8021Q \
            --enable CONFIG_NF_CONNTRACK \
            --enable CONFIG_MAC80211_HWSIM

      - name: Build kernel
        run: |
          cd kernel-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) Image.gz dtbs 2>&1 | tee build.log
          ls arch/arm64/boot/

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git \
            anykernel
          cp kernel-src/arch/arm64/boot/Image.gz anykernel/
          find kernel-src/arch/arm64/boot/dts -name "*.dtb" \
            -exec cat {} + > anykernel/dtb
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 \
            ../nethunter-kernel-a52sxq-lineage23.2.zip \
            . -x ".git*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a52sxq
          path: nethunter-kernel-a52sxq-lineage23.2.zip
          retention-days: 7
